# Load generator Job used to drive CPU up on ha-app and trigger the HPA.
#
# It runs a set of parallel busybox workers that hammer the /load endpoint in a
# tight loop. Watch the effect with:
#     kubectl -n ha-app get hpa ha-app -w
#     kubectl -n ha-app get pods -w
#     kubectl get nodes -w
#
# Delete it to let the app scale back down:
#     kubectl -n ha-app delete job ha-app-load
apiVersion: batch/v1
kind: Job
metadata:
  name: ha-app-load
  namespace: ha-app
  labels:
    app.kubernetes.io/name: ha-app-load
spec:
  # Run 5 parallel load workers.
  parallelism: 5
  completions: 5
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ha-app-load
    spec:
      restartPolicy: Never
      containers:
        - name: load
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              echo "Generating load against ha-app for ~5 minutes..."
              end=$(( $(date +%s) + 300 ))
              while [ "$(date +%s)" -lt "$end" ]; do
                wget -q -O /dev/null "http://ha-app.ha-app.svc.cluster.local/load?ms=200"
              done
              echo "Load generation complete."
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
