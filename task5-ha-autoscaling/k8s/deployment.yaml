apiVersion: v1
kind: ServiceAccount
metadata:
  name: ha-app
  namespace: ha-app
  labels:
    app.kubernetes.io/name: ha-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ha-app
  namespace: ha-app
  labels:
    app.kubernetes.io/name: ha-app
spec:
  # HPA manages the replica count at runtime; start at the HPA minReplicas.
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ha-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ha-app
    spec:
      serviceAccountName: ha-app
      # Spread pods across nodes / AZs for high availability.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ha-app
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: ha-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ha-app
          # Replace <ECR_URL> and tag at deploy time (Jenkins substitutes the git sha).
          image: <ECR_URL>:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          # Resource requests are CRITICAL: the HPA computes CPU utilization as a
          # percentage of the request. Limits cap burst usage.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
