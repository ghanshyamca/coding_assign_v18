# Custom nginx config: serves the SPA and reverse-proxies /api to the backend.
# Runs as the non-root "nginx" user (see Dockerfile), so we write pid/temp
# paths that are writable by that user and listen on an unprivileged port.

worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Temp paths writable by the non-root user.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  sendfile        on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types      text/plain text/css application/javascript application/json;

  # Name of the backend Kubernetes Service (ClusterIP) on port 3001.
  # Overridable via env if templated; hardcoded here for the manifests.
  upstream backend {
    server fullstack-backend.fullstack.svc.cluster.local:3001;
  }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint for k8s probes / Docker HEALTHCHECK.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    # Reverse-proxy API calls to the backend Service.
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
