apiVersion: apps/v1
kind: Deployment
metadata:
  name: fullstack-frontend
  namespace: fullstack
  labels:
    app: fullstack-frontend
    app.kubernetes.io/part-of: fullstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fullstack-frontend
  template:
    metadata:
      labels:
        app: fullstack-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # Replace with the frontend ECR image, e.g.
          # <account>.dkr.ecr.us-east-1.amazonaws.com/fullstack-frontend:<tag>
          image: REGISTRY/fullstack-frontend:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp
      volumes:
        # nginx writes pid/temp files to /tmp; provide a writable emptyDir
        # so the container root filesystem can stay read-only.
        - name: nginx-tmp
          emptyDir: {}
