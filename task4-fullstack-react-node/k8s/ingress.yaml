# AWS ALB Ingress example.
# Requires the AWS Load Balancer Controller installed in the cluster:
#   https://kubernetes-sigs.github.io/aws-load-balancer-controller/
#
# All traffic is routed to the frontend Service; the frontend nginx
# reverse-proxies /api to the backend Service in-cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fullstack-ingress
  namespace: fullstack
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fullstack-frontend
                port:
                  number: 80
