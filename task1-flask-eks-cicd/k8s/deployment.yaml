apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-eks
  namespace: flask-eks
  labels:
    app.kubernetes.io/name: flask-eks
    app.kubernetes.io/part-of: flask-eks
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flask-eks
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flask-eks
        app.kubernetes.io/part-of: flask-eks
    spec:
      serviceAccountName: flask-eks
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: flask-eks
          # Replaced by CI/CD (Jenkins `kubectl set image`). Placeholder below.
          image: REGISTRY/REPO:TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            # Overridden by CI/CD (`kubectl set env` in the Jenkinsfile);
            # distinct token from the image placeholder so `sed` substitutions
            # never collide.
            - name: APP_VERSION
              value: "APP_VERSION_PLACEHOLDER"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # gunicorn/python may need a writable temp dir when the root fs
            # is read-only.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
