apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared, environment-agnostic definitions. Overlays patch replicas,
# resources, namespace and image tags on top of these.
resources:
  - api-gateway/deployment.yaml
  - api-gateway/service.yaml
  - orders/deployment.yaml
  - orders/service.yaml

commonLabels:
  part-of: microsvc
