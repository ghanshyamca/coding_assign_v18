apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Shared, environment-agnostic definitions. Overlays patch replicas,
# resources, namespace and image tags on top of these.
resources:
  - api-gateway/deployment.yaml
  - api-gateway/service.yaml
  - orders/deployment.yaml
  - orders/service.yaml

# Modern replacement for the deprecated commonLabels field.
# includeSelectors keeps the old behavior (label lands on selectors too) so
# already-deployed workloads' immutable selectors stay unchanged.
labels:
  - includeSelectors: true
    pairs:
      part-of: microsvc
