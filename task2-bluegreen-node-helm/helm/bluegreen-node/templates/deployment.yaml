{{- if .Values.deployment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bluegreen-node.fullname" . }}
  labels:
    {{- include "bluegreen-node.labels" . | nindent 4 }}
    track: {{ .Values.track }}
    color: {{ .Values.color }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bluegreen-node.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bluegreen-node.selectorLabels" . | nindent 8 }}
        color: {{ .Values.color }}
    spec:
      serviceAccountName: {{ include "bluegreen-node.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.previewService.targetPort }}
              protocol: TCP
          env:
            - name: COLOR
              value: {{ .Values.color | quote }}
            - name: VERSION
              value: {{ .Values.image.tag | quote }}
            - name: PORT
              value: {{ .Values.previewService.targetPort | quote }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
